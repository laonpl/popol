services:
  - type: web
    name: popol-backend
    runtime: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install && npx puppeteer browsers install chrome
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://fitpoly.kr,https://www.fitpoly.kr
      - key: GEMINI_API_KEY
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false   # serviceAccountKey.json 내용을 한 줄 JSON으로 붙여넣기
      - key: NOTION_INTEGRATION_TOKEN
        sync: false
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/.cache/puppeteer
      - key: FIREBASE_PROJECT_ID
        value: popol-cb20b
      - key: FIREBASE_STORAGE_BUCKET
        value: popol-cb20b.firebasestorage.app
      - key: GITHUB_MODELS_ENDPOINT
        value: https://models.inference.ai.azure.com
      - key: GITHUB_MODELS_TOKEN
        sync: false
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_SECURE
        value: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
